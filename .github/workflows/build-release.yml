name: Build and Release CoopAndreas

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    env:
      XMAKE_ROOT_Y: y
      GTA_SA_DIR: ${{ github.workspace }}\gta-sa
      PLUGIN_SDK_DIR: ${{ github.workspace }}\plugin-sdk

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Visual Studio developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Prepare directories
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GTA_SA_DIR" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:PLUGIN_SDK_DIR" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\plugin-sdk-extract" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\dist" | Out-Null

      - name: Download plugin-sdk
        run: |
          $url = "https://github.com/DK22Pac/plugin-sdk/archive/refs/heads/master.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:GITHUB_WORKSPACE\plugin-sdk.zip"
          Expand-Archive -Path "$env:GITHUB_WORKSPACE\plugin-sdk.zip" -DestinationPath "$env:GITHUB_WORKSPACE\plugin-sdk-extract" -Force

          $dirs = Get-ChildItem "$env:GITHUB_WORKSPACE\plugin-sdk-extract" -Directory
          if ($dirs.Count -eq 1) {
            Copy-Item "$($dirs[0].FullName)\*" "$env:PLUGIN_SDK_DIR" -Recurse -Force
          } else {
            Copy-Item "$env:GITHUB_WORKSPACE\plugin-sdk-extract\*" "$env:PLUGIN_SDK_DIR" -Recurse -Force
          }

      - name: Debug environment
        run: |
          Write-Host "GITHUB_WORKSPACE=$env:GITHUB_WORKSPACE"
          Write-Host "GTA_SA_DIR=$env:GTA_SA_DIR"
          Write-Host "PLUGIN_SDK_DIR=$env:PLUGIN_SDK_DIR"
          Write-Host "XMAKE_ROOT_Y=$env:XMAKE_ROOT_Y"

          if (-not (Test-Path "$env:PLUGIN_SDK_DIR")) {
            throw "PLUGIN_SDK_DIR path does not exist"
          }

          Write-Host "plugin-sdk root contents:"
          Get-ChildItem "$env:PLUGIN_SDK_DIR" | Select-Object -First 20

      - name: Show xmake version
        run: xmake --version

      - name: Build client
        run: xmake build client

      - name: Build server
        run: xmake build server

      - name: Build proxy
        run: xmake build proxy

      - name: Collect outputs
        run: |
          $dist = "$env:GITHUB_WORKSPACE\dist"

          $files = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Recurse -File | Where-Object {
            $_.Name -in @("CoopAndreasSA.dll", "server.exe", "proxy.dll", "eax.dll")
          }

          if (-not $files) {
            throw "No build outputs found"
          }

          $files | ForEach-Object {
            Copy-Item $_.FullName $dist -Force
          }

          if ((Test-Path "$dist\proxy.dll") -and -not (Test-Path "$dist\eax.dll")) {
            Copy-Item "$dist\proxy.dll" "$dist\eax.dll" -Force
          }

          @"
CoopAndreas build from fork.

Included:
- CoopAndreasSA.dll
- server.exe
- eax.dll (copied from proxy.dll if needed)

Not included:
- compiled main.scm
- GTA San Andreas game files

Basic usage:
1. Put CoopAndreasSA.dll into the GTA San Andreas folder
2. Backup original eax.dll as eax_orig.dll
3. Put built eax.dll into the GTA San Andreas folder
4. Run server.exe
"@ | Set-Content -Path "$dist\README.txt" -Encoding UTF8

          Write-Host "Final dist contents:"
          Get-ChildItem $dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoopAndreas-windows-build
          path: ${{ github.workspace }}\dist\*

      - name: Create zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          Compress-Archive `
            -Path "$env:GITHUB_WORKSPACE\dist\*" `
            -DestinationPath "$env:GITHUB_WORKSPACE\CoopAndreas-${{ github.ref_name }}-windows.zip" `
            -Force

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}\CoopAndreas-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
